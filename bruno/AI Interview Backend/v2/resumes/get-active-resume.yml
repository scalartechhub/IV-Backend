info:
  name: Get Active Resume
  type: http
  seq: 4

http:
  method: GET
  url: "{{baseUrl}}/v2/resumes/active"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Fetch the currently active resume (`isActive: true`).
  Returns 404 if none is active.
