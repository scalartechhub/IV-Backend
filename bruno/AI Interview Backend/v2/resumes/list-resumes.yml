info:
  name: List Resumes
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/v2/resumes"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  List all resumes for the authenticated user (newest first).
