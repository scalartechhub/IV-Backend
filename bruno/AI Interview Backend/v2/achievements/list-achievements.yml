info:
  name: List Achievements
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/v2/achievements"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Returns `catalog` (achievementsCatalog) and `unlocked` (user achievements).
