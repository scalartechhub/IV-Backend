info:
  name: Check Achievements
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/v2/achievements/check"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "overallScore": 85
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Evaluate achievement rules against the user doc.

  Body (optional):
  - `overallScore` — required for `score_gte` rules; omit for streak/interview/problem checks only

  Response `data.unlocked` — newly unlocked achievement ids.
