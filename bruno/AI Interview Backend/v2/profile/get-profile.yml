info:
  name: Get Profile
  type: http
  seq: 1

http:
  method: GET
  url: "{{baseUrl}}/v2/profile"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  variables:
    - name: baseUrl
      value: http://localhost:5000/api
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body?.data?.uid) {
          bru.setEnvVar("uid", body.data.uid);
        } else if (body?.data?.id) {
          bru.setEnvVar("uid", body.data.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Fetch `users/{uid}` (lazy-inits `stats` and default skill docs if missing).

  Auto-saves `uid` for resume upload paths.
