info:
  name: Payment History
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/payment/history"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get authenticated user's payment history sorted by latest payment first.
