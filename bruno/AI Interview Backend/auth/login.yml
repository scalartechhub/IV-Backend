info:
  name: Login
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/auth/login"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "email": "{{email}}",
        "password": "{{password}}"
      }

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body?.data?.idToken) {
          bru.setEnvVar("token", body.data.idToken);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Login with email and password.

  Returns `idToken` in `data.idToken`. Auto-saves it as `token` for
  authenticated interview requests.

  Run after **Register** using the same credentials from the environment.
