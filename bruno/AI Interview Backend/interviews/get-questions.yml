info:
  name: Get Questions
  type: http
  seq: 7

http:
  method: GET
  url: "{{baseUrl}}/interviews/{{interviewId}}/questions"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        const questions = body?.data?.questions;
        if (Array.isArray(questions) && questions.length > 0) {
          bru.setEnvVar("questionId", questions[0].id);
          bru.setEnvVar(
            "questionIds",
            JSON.stringify(questions.map((q) => q.id))
          );
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get embedded questions from the interview document.

  Auto-saves `questionId` (first) and `questionIds` (JSON array) to environment.
  Use those IDs in Submit Answers.
