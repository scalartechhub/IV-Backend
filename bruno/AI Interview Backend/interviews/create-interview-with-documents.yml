info:
  name: Create Interview With Documents
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/interviews/create-with-documents"
  body:
    type: multipart-form
    data:
      - name: resume
        type: file
        value: []
      - name: jd
        type: file
        value: []
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body?.data?.id) {
          bru.setEnvVar("interviewId", body.data.id);
        }
        const questions = body?.data?.questions;
        if (Array.isArray(questions) && questions.length > 0) {
          bru.setEnvVar("questionId", questions[0].id);
          bru.setEnvVar(
            "questionIds",
            JSON.stringify(questions.map((q) => q.id))
          );
        }

settings:
  encodeUrl: true
  timeout: 120000
  followRedirects: true
  maxRedirects: 5

docs: |-
  Create an interview by uploading resume and/or JD PDFs and generate questions in a single request.

  - Upload at least one file using multipart fields `resume` and/or `jd`.
  - Resume/JD are parsed and stored on the interview document.
  - Does **not** use user profile `technology` / `experienceLevel`.
  - Questions are generated live during the session from resume/JD analysis plus `users.preferences.interview` for
    `difficultyLevel`, `durationMinutes`, and `interviewType`.
  - Returns an error if user settings are missing.
  - May take 30–60 seconds (Gemini AI).

  Auto-saves `interviewId`, `questionId` (first), and `questionIds` (JSON array) to environment.
