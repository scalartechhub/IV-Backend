info:
  name: Finish Interview
  type: http
  seq: 8

http:
  method: POST
  url: "{{baseUrl}}/interviews/{{interviewId}}/finish"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  variables:
    - name: interviewId
      value: sAQSCCZqUMPyT5j8arpy

settings:
  encodeUrl: true
  timeout: 300000
  followRedirects: true
  maxRedirects: 5

docs: |-
  Finish the interview. Answers are read from the interview document in Firestore
  (`questions[].answer`) — save them via the Firebase SDK before calling this endpoint.

  Response (`data`):
  - `results` — per-question evaluation (score, feedback)
  - `totalScore` — `{ score, outOf }` earned points / maximum (each question 0–10)
  - `answeredCount`
  - `report` — `overallScore` (0–100), `strengths`, `weaknesses`, `recommendations`, `summary`, `generatedAt`

  May take 30–60 seconds (Gemini AI).
