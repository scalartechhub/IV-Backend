info:
  name: Create Interview
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/interviews/create"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "technology": "Frontend Developer",
        "experienceLevel": "2 years",
        "interviewType": "technical"
      }
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body?.data?.id) {
          bru.setEnvVar("interviewId", body.data.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Create a new interview.

  Body fields:
  - `technology` — role/stack focus (e.g. "Frontend Developer")
  - `experienceLevel` — e.g. "2 years", "Junior", "Senior"
  - `interviewType` — `technical` | `hr` | `mixed`

  Auto-saves `interviewId` to environment.
