info:
  name: Create Interview
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/interviews/create"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "technology": "node js Developer",
        "experienceLevel": "3 years",
        "difficultyLevel": "medium",
        "interviewType": "technicalInterview",
        "durationMinutes": 30
      }
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  variables:
    - name: token
      value: eyJhbGciOiJSUzI1NiIsImtpZCI6ImIyNDg2Mzc0OTVjYjM4N2U0OWViNmRlMThkZjk5N2VlOGU1YWUyOTciLCJ0eXAiOiJKV1QifQ..T-x8-VY6-DGyafFxiohSTUNmaWdYhX6zNhlSQV43eWT1U8YR9PmExjz0A5tuNhtu6E9B7nEvDNK69oW-Tq6LzZcDY7y96g7HvHmnMtGxrC_54iE9-NUFqSE5eQeuLfbxSYFGGaY5bdZtItemdIsRIHw0IOL1wBqFMGd8wt4nHq8wKApAt40Bs8zFaOMSqeWfkBVgOmko7o8XFGhVtVtjcAed5TnJ0bzEmCXJsq_0MwvB3vMHmr3R8WNr2d3ZFvR2N-U7C9qpJyYX7jrZS9KRJ_OQHyCaLhjbiE-iuyyG4tunfJcyUZANx576Bqe2WWxOYM8DTPi90BnIyjUn4XHMWQ
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body?.data?.id) {
          bru.setEnvVar("interviewId", body.data.id);
        }
        const questions = body?.data?.questions;
        if (Array.isArray(questions) && questions.length > 0) {
          bru.setEnvVar("questionId", questions[0].id);
          bru.setEnvVar(
            "questionIds",
            JSON.stringify(questions.map((q) => q.id))
          );
        }

settings:
  encodeUrl: true
  timeout: 120000
  followRedirects: true
  maxRedirects: 5

docs: |-
  Create a new interview and generate questions in a single request.

  Body fields:
  - `technology` — role/stack focus (e.g. "Frontend Developer")
  - `experienceLevel` — e.g. "2 years", "Junior", "Senior"
  - `difficultyLevel` — `easy` | `medium` | `hard` | `expert`
  - `interviewType` — `technicalInterview` | `codingInterview` | `systemDesign` | `hrInterview` | `behavioralInterview`
  - `durationMinutes` — interview duration in minutes (validated on frontend)

  Creates a live interview session. Questions are asked dynamically during the session.

  Auto-saves `interviewId`, `questionId` (first), and `questionIds` (JSON array) to environment.
