info:
  name: Create Interview
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/interviews/create"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "technology": "Frontend Developer",
        "experienceLevel": "2 years",
        "interviewType": "technical",
        "durationMinutes": 30,
        "questionCount": 10
      }
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  variables:
    - name: token
      value: eyJhbGciOiJSUzI1NiIsImtpZCI6ImVlOTA0NmVhZDJlMDUwMDAxMGVkNTA0M2I0ODNkODRiMGM1MmM3YzQiLCJ0eXAiOiJKV1QifQ..aqWAxw8fSlBqDpWAhFoNumx70eqlQEOro0ynNZ5Z59tPpCcn9mr09K4czkDZ4KADzHCSQkWP1muz0XLmgFscHNru_ObO2TMFHoM3w377lK9zF1M3CGOm3bTSU_wSH-KBe8wEJ1VKJZcRkEoINwTlJVSGNeRe8atfdOD0UKytR9Vhp5RU4-0rOMpFfPbcVJA5dMY4ghcYJJn85JERRVIjPHCv7h1-bwcR2wrvGZmfwH26jyVce1zy5zuwfqnlB0mj1UWDvPG1Tp7XBwzdR1tfFYk4h-stlRLdrXGrQbenX1FWPgWca2294RORytS5EiInaOUlonfKcqYAepQMbMSmPQ
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body?.data?.id) {
          bru.setEnvVar("interviewId", body.data.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Create a new interview.

  Body fields:
  - `technology` — role/stack focus (e.g. "Frontend Developer")
  - `experienceLevel` — e.g. "2 years", "Junior", "Senior"
  - `interviewType` — `technical` | `hr` | `mixed`
  - `durationMinutes` — interview duration in minutes (validated on frontend)
  - `questionCount` — how many questions to generate (validated on frontend)

  Auto-saves `interviewId` to environment.
