info:
  name: Create Interview
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/interviews/create"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "technology": "node js Developer",
        "experienceLevel": "3 years",
        "difficultyLevel": "medium",
        "interviewType": "technicalInterview",
        "durationMinutes": 30,
        "questionCount": 9
      }
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  variables:
    - name: token
      value: eyJhbGciOiJSUzI1NiIsImtpZCI6IjJmMjk1MGEyNGFlYWRkMjYzYzIxM2I2MDNhZjMxNWEzMjdiNmM3MjAiLCJ0eXAiOiJKV1QifQ..D3nHSMrVscv1j-NDJ71Pu9wDviHn8i7JAI0qqw5ApMmuYMwHR7TRMd7WSX51CuVh8Hw1_Me26S1oUvrvsAQyd1g2SUWRe1e8g6wsF_6-q4F7CkhF7rQ8rpnLn7JtG2Aff3XwKP0A2q48wG2BM1AawKjiUtE7dTAJVIc8AdF53GHcN91jk8Ancb7LEBzDDMrxRa6GlDfIo0kRl3MSnEB4jTha_bv1oJEneEm12aWJs-SpLty9auY9CVNvFZkd3oFpL2g_0EF38UD8eXcREVXuM8Bbg47OdYVgAmeQM6mSP118RBi1Mr6mqFFEpVse5g2Ik_1zw8pQRZrdVsgOwgET-A
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        if (body?.data?.id) {
          bru.setEnvVar("interviewId", body.data.id);
        }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Create a new interview.

  Body fields:
  - `technology` — role/stack focus (e.g. "Frontend Developer")
  - `experienceLevel` — e.g. "2 years", "Junior", "Senior"
  - `difficultyLevel` — `easy` | `medium` | `hard` | `expert`
  - `interviewType` — `technicalInterview` | `codingInterview` | `systemDesign` | `hrInterview` | `behavioralInterview`
  - `durationMinutes` — interview duration in minutes (validated on frontend)
  - `questionCount` — how many questions to generate (validated on frontend)

  `difficultyLevel` and `interviewType` are stored on the interview and used by **Generate Questions**.

  Auto-saves `interviewId` to environment.
