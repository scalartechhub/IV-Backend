http:
  method: GET
  url: "{{baseUrl}}/interviews/{{interviewId}}"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get interview details by ID. Uses `interviewId` from environment.
