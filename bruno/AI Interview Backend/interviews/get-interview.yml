info:
  name: Get Interview by ID
  type: http
  seq: 3

http:
  method: GET
  url: "{{baseUrl}}/interviews/{{interviewId}}"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  variables:
    - name: interviewId
      value:

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get full interview details in a **single read**.

  Returns embedded:
  - `questions[]` — question, difficulty, answer, score, feedback
  - `report` — when interview is finished
  - `overallScore`, `questionCount`, `status`

  Uses `interviewId` from environment (set by Create Interview).
