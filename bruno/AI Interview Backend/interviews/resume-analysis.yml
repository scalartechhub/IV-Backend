docs: |-
  Upload resume PDF for the logged-in user (multipart field: `file`).

  - Requires Bearer token — run **Login** first.
  - Parses resume with the same AI analysis used during interview upload.
  - Stores the file in Firebase Storage under `users/{uid}/resumes/`.
  - Appends an entry to `resumeAnalyses` on the user document:
    `{ no, resumeUrl, analysis, uploadedAt }`.
  - Resume URL is stored only inside `resumeAnalyses`, not duplicated at user root.

  Update the file path or pick a PDF in Bruno before sending.
