info:
  name: List Interviews
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/interviews"
  params:
    - name: page
      value: "1"
      type: query
    - name: limit
      value: "10"
      type: query
    - name: status
      value: draft
      type: query
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  List interviews with pagination (summary view — no embedded Q&A payload).

  Optional `status` filter: `draft` | `started` | `completed` | `cancelled`

  Response fields per item: `technology`, `experienceLevel`, `interviewType`,
  `questionCount`, `answeredCount`, `overallScore`, `status`.
