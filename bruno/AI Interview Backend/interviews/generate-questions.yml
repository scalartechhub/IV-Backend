info:
  name: Generate Questions
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/interviews/{{interviewId}}/generate-questions"
  auth:
    type: bearer
    token: "{{token}}"

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();
        const questions = body?.data?.questions;
        if (Array.isArray(questions) && questions.length > 0) {
          bru.setEnvVar("questionId", questions[0].id);
          bru.setEnvVar(
            "questionIds",
            JSON.stringify(questions.map((q) => q.id))
          );
        }

settings:
  encodeUrl: true
  timeout: 120000
  followRedirects: true
  maxRedirects: 5

docs: |-
  Generate interview questions and embed them in the interview document.

  Case 1 — interview created via **Create Interview** (JSON payload):
  uses `difficultyLevel`, `interviewType`, `durationMinutes`, and `questionCount` from the interview.

  Case 2 — interview created via **Create Interview With Documents**:
  uses resume/JD analysis from the interview and reads
  `difficultyLevel`, `durationMinutes`, `interviewType`, and `questionCount` from `users.settings`.
  Returns an error if user settings are missing.

  May take 30–60 seconds (Gemini AI).

  Auto-saves `questionId` (first) and `questionIds` (JSON array) to environment.
