info:
  name: Submit Answers
  type: http
  seq: 8

http:
  method: POST
  url: "{{baseUrl}}/interviews/{{interviewId}}/answer"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "answers": [
          {
            "questionId": "{{questionId1}}",
            "answer": "React is a JavaScript library for building UIs using components and hooks."
          },
          {
            "questionId": "{{questionId2}}",
            "answer": "useState lets you add local state to functional components."
          }
        ]
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 300000
  followRedirects: true
  maxRedirects: 5

docs: |-
  Submit all interview answers in one request.
  All answers are evaluated in a single Gemini API call.
  Include every attempted question in the `answers` array (1–10 items).
