info:
  name: Submit Answers
  type: http
  seq: 8

http:
  method: POST
  url: "{{baseUrl}}/interviews/{{interviewId}}/answer"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "answers": [
          {
            "questionId": "{{questionId}}",
            "answer": "undefined means a variable is declared but has not been assigned a value yet. null is an intentionally assigned empty value."
          }
        ]
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 300000
  followRedirects: true
  maxRedirects: 5

docs: |-
  Submit interview answers in one batch request (1–10 items).

  **Before sending:**
  1. Run **Generate Questions** or **Get Questions**
  2. Copy `id` values from `data.questions[]` into each `questionId`
     (first ID is auto-saved as `{{questionId}}`; full list in `questionIds` env var)

  Response fields:
  - `results[]` — per-question `score`, `feedback`, `answeredAt`
  - `overallScore` — aggregate out of 100
  - `answeredCount`

  Unanswered questions score 0 in `overallScore`.

  **Tip:** Duplicate the answer object in the body for each question,
  replacing `questionId` with IDs from the questions response.
