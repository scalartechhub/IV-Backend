info:
  name: Get Report
  type: http
  seq: 10

http:
  method: GET
  url: "{{baseUrl}}/interviews/{{interviewId}}/report"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  Get the embedded interview report.

  **Note:** `GET /interviews/:id` also returns `report` in the same document
  (single read for the full detail page).

  Call after **Finish Interview**.
